{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ms-b
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app: ms-b
  ports:
  - port: {{ .Values.port }}
    targetPort: {{ .Values.port }}
    nodePort: {{ .Values.nodePort }}
{{- end }}
