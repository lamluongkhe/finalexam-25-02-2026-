{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-a
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-a
  template:
    metadata:
      labels:
        app: ms-a
    spec:
      containers:
      - name: ms-a
        image: {{ .Values.image }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.port }}
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "{{ .Values.global.kafka.brokerName }}:{{ .Values.global.kafka.internalPort }}"
        - name: REDIS_HOST
          value: {{ .Values.redisHost | quote }}
        - name: REDIS_PORT
          value: {{ .Values.redisPort | quote }}

        readinessProbe:
          tcpSocket:
            port: {{ .Values.port }}
          initialDelaySeconds: 40

        livenessProbe:
          tcpSocket:
            port: {{ .Values.port }}
          initialDelaySeconds: 60
{{- end }}
