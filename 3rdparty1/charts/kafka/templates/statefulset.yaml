{{- if .Values.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.broker.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}

spec:
  serviceName: {{ .Values.broker.name }}
  replicas: 1

  selector:
    matchLabels:
      app: {{ .Values.broker.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.broker.name }}

    spec:
      hostname: {{ .Values.broker.name }}

      containers:
      - name: kafka
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        ports:
        - containerPort: {{ .Values.ports.external }}
        - containerPort: {{ .Values.ports.internal }}

        env:
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "{{ .Values.zookeeper.name }}:{{ .Values.zookeeper.port }}"

        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"

        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"

        - name: KAFKA_ADVERTISED_LISTENERS
          value: >-
            PLAINTEXT://{{ .Values.broker.name }}:{{ .Values.ports.internal }},
            PLAINTEXT_HOST://{{ .Values.broker.name }}:{{ .Values.ports.external }}

        - name: KAFKA_BROKER_ID
          value: {{ .Values.broker.id | quote }}

        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"

        volumeMounts:
        - name: data
          mountPath: /var/lib/kafka/data

        startupProbe:
          tcpSocket:
            port: {{ .Values.ports.internal }}

        readinessProbe:
          tcpSocket:
            port: {{ .Values.ports.internal }}

        livenessProbe:
          tcpSocket:
            port: {{ .Values.ports.internal }}

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.persistence.size | default "5Gi" }}
{{- end }}
